$schema: https://json-schema.org/draft/2020-12/schema
$title: ZenoytdlConfigBundle
$type: object
additionalProperties: false
required:
  - general
  - profiles
  - subscriptions
  - ytdl_sub_conf
properties:
  general:
    $ref: '#/$defs/general'
  profiles:
    $ref: '#/$defs/profiles'
  subscriptions:
    $ref: '#/$defs/subscriptions'
  ytdl_sub_conf:
    $ref: '#/$defs/ytdl_sub_conf'
  cache:
    type: object
  queues:
    type: object
  logging:
    type: object
$defs:
  general:
    type: object
    additionalProperties: true
    required: [workspace, default_profile, environment]
    properties:
      workspace:
        type: string
        minLength: 1
      default_profile:
        type: string
        minLength: 1
      environment:
        type: string
        enum: [development, staging, production]
      log_level:
        type: string
        enum: [DEBUG, INFO, WARNING, ERROR]
      execution:
        type: object
        additionalProperties: false
        properties:
          dry_run:
            type: boolean
  profiles:
    type: object
    additionalProperties: false
    required: [profiles]
    properties:
      profiles:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: true
          required: [name, media_type, quality_profile]
          properties:
            name:
              type: string
              minLength: 1
            media_type:
              type: string
              enum: [video, audio, shorts]
            quality_profile:
              type: string
              minLength: 1
  subscriptions:
    type: object
    additionalProperties: false
    required: [subscriptions]
    properties:
      subscriptions:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: true
          required: [name, profile, sources]
          properties:
            name:
              type: string
              minLength: 1
            profile:
              type: string
              minLength: 1
            enabled:
              type: boolean
            sources:
              type: array
              minItems: 1
              items:
                type: string
                minLength: 1
            schedule:
              type: object
              additionalProperties: true
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [manual, interval]
                every_hours:
                  type: integer
                  minimum: 1
              allOf:
                - if:
                    properties:
                      mode:
                        const: interval
                  required: [mode]
                  then:
                    required: [every_hours]
  ytdl_sub_conf:
    type: object
    additionalProperties: false
    required: [integration, profile_preset_map]
    properties:
      integration:
        type: object
        additionalProperties: false
        required: [provider, min_version, binary]
        properties:
          provider:
            type: string
            enum: [ytdl-sub]
          min_version:
            type: string
            minLength: 1
          binary:
            type: string
            minLength: 1
      profile_preset_map:
        type: object
        minProperties: 1
        additionalProperties:
          type: string
      invocation:
        type: object
        additionalProperties: false
        properties:
          extra_args:
            type: array
            items:
              type: string
